<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ourita</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap");

:root {
  color-scheme: dark;
  --bg-1: #090312;
  --bg-2: #12041d;
  --panel: rgba(20, 11, 33, 0.94);
  --panel-soft: rgba(15, 9, 28, 0.82);
  --screen: #081019;
  --screen-glow: rgba(76, 255, 239, 0.16);
  --ink: #f6ecff;
  --muted: #b59fd5;
  --line: #24123c;
  --line-strong: #36205b;
  --lilac: #caa7ff;
  --turq: #76fff1;
  --fuchsia: #ff79da;
  --peach: #ffc890;
  --term-green-soft: #63d98e;
  --term-green: #d8ffe8;
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.42);
  --glow-fuchsia: 0 0 24px rgba(255, 121, 218, 0.22);
  --glow-turq: 0 0 24px rgba(118, 255, 241, 0.18);
  --cut: 16px;
  --font-ui: "Press Start 2P", monospace;
  --font-screen: "VT323", monospace;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 16% 18%, rgba(255, 121, 218, 0.14), transparent 18%),
    radial-gradient(circle at 82% 16%, rgba(118, 255, 241, 0.12), transparent 18%),
    radial-gradient(circle at 22% 86%, rgba(202, 167, 255, 0.12), transparent 20%),
    linear-gradient(180deg, var(--bg-2), var(--bg-1));
  font-family: var(--font-ui);
}

button,
input,
select {
  font: inherit;
}

#cantidad_dos::-webkit-outer-spin-button,
#cantidad_dos::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

#cantidad_dos {
  -moz-appearance: textfield;
  appearance: textfield;
}

.scene {
  position: relative;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px 14px;
  overflow: hidden;
}

.scene::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(118, 255, 241, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 121, 218, 0.05) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.86), transparent 94%);
  pointer-events: none;
}

.pixel {
  position: absolute;
  width: 10px;
  height: 10px;
  background: currentColor;
  box-shadow:
    10px 0 currentColor,
    0 10px currentColor,
    10px 10px currentColor;
  opacity: 0.88;
  pointer-events: none;
}

.pixel-a {
  top: 84px;
  left: 8%;
  color: rgba(255, 121, 218, 0.8);
}

.pixel-b {
  right: 9%;
  top: 18%;
  color: rgba(118, 255, 241, 0.8);
}

.pixel-c {
  left: 16%;
  bottom: 15%;
  color: rgba(255, 200, 144, 0.8);
}

.pixel-d {
  right: 13%;
  bottom: 10%;
  color: rgba(202, 167, 255, 0.82);
}

.star {
  position: absolute;
  --star-scale: 1;
  width: 6px;
  height: 6px;
  background: currentColor;
  box-shadow:
    12px 0 currentColor,
    6px 6px currentColor,
    12px 6px currentColor,
    18px 6px currentColor,
    0 12px currentColor,
    6px 12px currentColor,
    12px 12px currentColor,
    18px 12px currentColor,
    24px 12px currentColor,
    12px 12px currentColor,
    6px 18px currentColor,
    12px 18px currentColor,
    18px 18px currentColor,
    12px 24px currentColor;
  opacity: 0.46;
  filter: drop-shadow(0 0 10px currentColor);
  pointer-events: none;
}

.star-a {
  top: 14%;
  right: 18%;
  color: rgba(255, 121, 218, 0.86);
  --star-scale: 0.92;
  transform: scale(var(--star-scale));
}

.star-b {
  left: 14%;
  top: 40%;
  color: rgba(118, 255, 241, 0.76);
  --star-scale: 0.76;
  transform: scale(var(--star-scale));
}

.star-c {
  right: 10%;
  bottom: 23%;
  color: rgba(202, 167, 255, 0.84);
  --star-scale: 1.08;
  transform: scale(var(--star-scale));
}

.star-d {
  left: 12%;
  bottom: 18%;
  color: rgba(255, 200, 144, 0.72);
  --star-scale: 0.68;
  transform: scale(var(--star-scale));
}

.device {
  position: relative;
  z-index: 1;
  width: min(100%, 430px);
  padding: 16px;
  background:
    linear-gradient(180deg, rgba(39, 20, 65, 0.96), rgba(17, 9, 29, 0.98));
  border: 3px solid #05010b;
  box-shadow:
    0 0 0 3px var(--line-strong),
    0 0 0 6px rgba(118, 255, 241, 0.14),
    var(--shadow),
    var(--glow-fuchsia);
  clip-path: polygon(
    var(--cut) 0,
    calc(100% - var(--cut)) 0,
    100% var(--cut),
    100% calc(100% - var(--cut)),
    calc(100% - var(--cut)) 100%,
    var(--cut) 100%,
    0 calc(100% - var(--cut)),
    0 var(--cut)
  );
}

.device::before {
  content: "";
  position: absolute;
  inset: 10px;
  border: 2px solid rgba(118, 255, 241, 0.14);
  clip-path: polygon(
    12px 0,
    calc(100% - 12px) 0,
    100% 12px,
    100% calc(100% - 12px),
    calc(100% - 12px) 100%,
    12px 100%,
    0 calc(100% - 12px),
    0 12px
  );
  pointer-events: none;
}

.device-top {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.badge {
  display: inline-grid;
  place-items: center;
  min-height: 30px;
  padding: 0 10px;
  color: #12041d;
  background: linear-gradient(180deg, var(--turq), #65d8ff);
  border: 2px solid #03131a;
  box-shadow: var(--glow-turq);
  font-size: 0.56rem;
  line-height: 1;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-label {
  display: block;
  line-height: 1;
  transform: translateY(1px);
}

.lights {
  display: flex;
  gap: 8px;
}

.light {
  width: 12px;
  height: 12px;
  border: 2px solid #05010b;
  box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04);
}

.light-one {
  background: var(--fuchsia);
  box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04), 0 0 14px rgba(255, 121, 218, 0.44);
}

.light-two {
  background: var(--turq);
  box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.04), 0 0 14px rgba(118, 255, 241, 0.34);
}

.screen {
  position: relative;
  z-index: 1;
  overflow: hidden;
  padding: 14px 14px 12px;
  margin-bottom: 14px;
  background:
    linear-gradient(180deg, rgba(6, 22, 28, 0.98), rgba(5, 11, 20, 0.98));
  border: 3px solid #010307;
  box-shadow:
    0 0 0 3px rgba(118, 255, 241, 0.22),
    inset 0 0 0 1px rgba(255, 255, 255, 0.06),
    inset 0 -12px 28px rgba(118, 255, 241, 0.05),
    var(--glow-turq);
  clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
}

.screen::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 52%;
  width: 72%;
  height: 58%;
  transform: translate(-50%, -50%);
  background:
    radial-gradient(circle, rgba(118, 255, 241, 0.18) 0%, rgba(255, 121, 218, 0.1) 42%, transparent 72%);
  filter: blur(14px);
  pointer-events: none;
}

.screen::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.03) 0 2px,
      rgba(255, 255, 255, 0) 2px 5px
    );
  pointer-events: none;
}

.screen-kicker {
  margin: 0 0 8px;
  color: var(--term-green-soft);
  font-size: 0.48rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(99, 217, 142, 0.18);
}

.screen-rate-wrap {
  position: relative;
  z-index: 1;
  margin: 0 -2px;
  padding: 8px 10px 8px;
  background:
    linear-gradient(180deg, rgba(8, 25, 33, 0.84), rgba(6, 13, 24, 0.9));
  border: 2px solid rgba(118, 255, 241, 0.18);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.04),
    0 0 22px rgba(118, 255, 241, 0.12),
    0 0 26px rgba(255, 121, 218, 0.08);
  clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
}

.screen-rate-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(118, 255, 241, 0.08), transparent 66%);
  pointer-events: none;
}

.screen-context {
  position: relative;
  z-index: 1;
  margin: 0;
  color: var(--term-green-soft);
  font-size: 0.5rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(99, 217, 142, 0.16);
}

.screen-value-line {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 10px;
  margin-top: 6px;
}

.screen-rate {
  margin: 0;
  color: #d7fff9;
  font-family: var(--font-screen);
  font-size: clamp(2rem, 5vw, 2.7rem);
  line-height: 0.85;
  text-shadow:
    0 0 14px rgba(118, 255, 241, 0.28),
    0 0 20px rgba(255, 121, 218, 0.12);
}

.screen-target {
  margin: 0 0 2px;
  padding: 4px 8px 3px;
  color: #0d0917;
  background: linear-gradient(180deg, rgba(118, 255, 241, 0.98), rgba(171, 255, 249, 0.92));
  border: 2px solid #041116;
  box-shadow: 0 0 14px rgba(118, 255, 241, 0.14);
  font-size: 0.46rem;
  line-height: 1;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.screen-helper {
  position: relative;
  z-index: 1;
  margin: 0;
  min-height: 22px;
  color: var(--term-green-soft);
  font-size: 0.5rem;
  line-height: 1.6;
}

.screen-meta {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 10px;
  margin-top: 8px;
}

.screen-signature {
  flex: 0 0 auto;
  color: #f5c8ff;
  font-size: 0.4rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-shadow:
    0 0 10px rgba(255, 121, 218, 0.14),
    0 0 14px rgba(202, 167, 255, 0.12);
  opacity: 0.82;
}

.controls {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 10px;
}

.selectors-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 10px;
  align-items: end;
}

.control-card,
.amount-row {
  padding: 10px;
  background: linear-gradient(180deg, rgba(21, 12, 36, 0.98), rgba(12, 7, 22, 0.98));
  border: 2px solid #05010b;
  box-shadow:
    0 0 0 2px rgba(202, 167, 255, 0.14),
    inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
}

.control-label {
  display: block;
  margin-bottom: 8px;
  color: var(--term-green-soft);
  font-size: 0.5rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(99, 217, 142, 0.18);
}

.amount-grid .control-label {
  color: var(--term-green);
  font-size: 0.54rem;
  text-shadow:
    0 0 12px rgba(216, 255, 232, 0.18),
    0 0 18px rgba(99, 217, 142, 0.1);
}

.select-shell,
.input-shell {
  position: relative;
}

.select-shell::after {
  content: ">";
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  color: var(--fuchsia);
  font-size: 0.7rem;
  pointer-events: none;
}

.select-shell select,
.input-shell input {
  width: 100%;
  min-height: 48px;
  padding: 12px 14px;
  border: 2px solid #08121d;
  background: linear-gradient(180deg, rgba(13, 15, 27, 0.98), rgba(8, 10, 20, 0.98));
  color: var(--ink);
  outline: none;
  box-shadow:
    inset 0 0 0 1px rgba(118, 255, 241, 0.1),
    0 0 0 2px rgba(255, 121, 218, 0.08);
}

.select-shell select {
  appearance: none;
  padding-right: 34px;
  font-size: 0.72rem;
  line-height: 1.2;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.select-name {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  min-height: 20px;
  margin: 8px 0 0;
  padding: 0 6px;
  color: var(--turq);
  font-size: 0.36rem;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(8, 18, 29, 0.92);
  border: 2px solid #071019;
  box-shadow:
    inset 0 0 0 1px rgba(118, 255, 241, 0.08),
    0 0 12px rgba(118, 255, 241, 0.08);
}

.amount-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.amount-row {
  display: grid;
  gap: 8px;
}

.result-row {
  box-shadow:
    0 0 0 2px rgba(118, 255, 241, 0.18),
    0 0 18px rgba(255, 121, 218, 0.08),
    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.result-row.is-flashing,
.screen-rate-wrap.is-flashing {
  animation: resultPulse 340ms ease-out;
}

.input-shell input {
  font-family: var(--font-screen);
  font-size: 2rem;
  line-height: 1;
  letter-spacing: 0.02em;
  text-align: right;
}

#cantidad_dos {
  color: #f8deff;
  background:
    radial-gradient(circle at center, rgba(118, 255, 241, 0.1), rgba(9, 11, 24, 0.96) 64%),
    linear-gradient(180deg, rgba(17, 14, 29, 0.98), rgba(7, 9, 20, 0.98));
  box-shadow:
    inset 0 0 0 1px rgba(118, 255, 241, 0.14),
    0 0 18px rgba(255, 121, 218, 0.08);
  text-shadow:
    0 0 12px rgba(255, 121, 218, 0.18),
    0 0 16px rgba(118, 255, 241, 0.12);
}

.device-bottom {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.swap-button {
  display: inline-grid;
  place-items: center;
  width: 84px;
  min-height: 46px;
  padding: 0;
  border: 2px solid #05010b;
  background:
    linear-gradient(180deg, rgba(36, 21, 61, 0.98), rgba(19, 11, 34, 0.98));
  color: var(--turq);
  box-shadow:
    0 0 0 2px rgba(118, 255, 241, 0.12),
    0 0 18px rgba(118, 255, 241, 0.08);
  clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
  cursor: pointer;
  transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
}

.swap-button:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
  box-shadow:
    0 0 0 2px rgba(255, 121, 218, 0.16),
    0 0 18px rgba(255, 121, 218, 0.12);
}

.swap-icon {
  font-size: 1.15rem;
  line-height: 1;
  text-shadow:
    0 0 10px rgba(118, 255, 241, 0.18),
    0 0 14px rgba(255, 121, 218, 0.1);
}

.swap-button-inline {
  align-self: center;
  margin-bottom: 2px;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.data-note {
  margin: 0;
  width: 100%;
  padding: 10px 12px;
  color: var(--muted);
  font-size: 0.44rem;
  line-height: 1.7;
  text-align: center;
  background: var(--panel-soft);
  border: 2px solid #05010b;
  box-shadow: 0 0 0 2px rgba(118, 255, 241, 0.08);
  clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
}

.data-note a {
  color: var(--turq);
  text-decoration: none;
}

.micro-footer {
  position: relative;
  z-index: 1;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  width: auto;
  margin-top: 8px;
}

.micro-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 30px;
  padding: 0 10px;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.36rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: rgba(15, 9, 28, 0.8);
  border: 2px solid #05010b;
  box-shadow:
    0 0 0 2px rgba(202, 167, 255, 0.08),
    inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
  transition: transform 140ms ease, color 140ms ease, box-shadow 140ms ease;
}

.micro-link:hover {
  transform: translateY(-1px);
  color: var(--ink);
  box-shadow:
    0 0 0 2px rgba(118, 255, 241, 0.12),
    0 0 18px rgba(255, 121, 218, 0.12),
    inset 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.micro-link-mark {
  color: var(--fuchsia);
  font-size: 0.5rem;
}

select:focus-visible,
input:focus-visible,
button:focus-visible,
a:focus-visible {
  outline: 3px solid rgba(118, 255, 241, 0.22);
  outline-offset: 2px;
}

@media (prefers-reduced-motion: no-preference) {
  .device {
    animation: hoverDevice 6s ease-in-out infinite;
  }

  .pixel-a,
  .pixel-c {
    animation: blinkA 3s steps(2) infinite;
  }

  .pixel-b,
  .pixel-d {
    animation: blinkB 4s steps(2) infinite;
  }

  .star-a,
  .star-c {
    animation: starFloatA 5.2s ease-in-out infinite;
  }

  .star-b,
  .star-d {
    animation: starFloatB 6.2s ease-in-out infinite;
  }
}

@keyframes hoverDevice {
  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-4px);
  }
}

@keyframes blinkA {
  0%,
  100% {
    opacity: 0.25;
  }

  50% {
    opacity: 0.88;
  }
}

@keyframes blinkB {
  0%,
  100% {
    opacity: 0.9;
  }

  50% {
    opacity: 0.28;
  }
}

@keyframes starFloatA {
  0%,
  100% {
    transform: translateY(0) scale(var(--star-scale));
  }

  50% {
    transform: translateY(-8px) scale(calc(var(--star-scale) + 0.06));
  }
}

@keyframes starFloatB {
  0%,
  100% {
    transform: translateY(0) scale(var(--star-scale));
  }

  50% {
    transform: translateY(7px) scale(calc(var(--star-scale) + 0.06));
  }
}

@keyframes resultPulse {
  0% {
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 22px rgba(118, 255, 241, 0.12),
      0 0 26px rgba(255, 121, 218, 0.08);
  }

  45% {
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.08),
      0 0 28px rgba(118, 255, 241, 0.22),
      0 0 34px rgba(255, 121, 218, 0.18);
  }

  100% {
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      0 0 22px rgba(118, 255, 241, 0.12),
      0 0 26px rgba(255, 121, 218, 0.08);
  }
}

@media (max-width: 520px) {
  .scene {
    padding: 14px 10px;
  }

  .device {
    padding: 12px;
  }

  .selectors-row,
  .amount-grid {
    grid-template-columns: 1fr;
  }

  .swap-button-inline {
    justify-self: center;
    margin: -2px 0 2px;
  }

  .badge {
    font-size: 0.5rem;
  }

  .select-shell select {
    font-size: 0.66rem;
  }

  .screen-meta {
    flex-direction: column;
    align-items: flex-start;
  }

  .screen-value-line {
    flex-direction: column;
    align-items: flex-start;
  }

  .micro-footer {
    gap: 6px;
  }

  .micro-link {
    justify-content: center;
    width: 100%;
  }
}
</style>
</head>

<body>
<div class="scene">
  <span class="pixel pixel-a" aria-hidden="true"></span>
  <span class="pixel pixel-b" aria-hidden="true"></span>
  <span class="pixel pixel-c" aria-hidden="true"></span>
  <span class="pixel pixel-d" aria-hidden="true"></span>
  <span class="star star-a" aria-hidden="true"></span>
  <span class="star star-b" aria-hidden="true"></span>
  <span class="star star-c" aria-hidden="true"></span>
  <span class="star star-d" aria-hidden="true"></span>

  <main class="device">
    <div class="device-top">
      <span class="badge"><span class="badge-label">Ourita</span></span>
      <div class="lights" aria-hidden="true">
        <span class="light light-one"></span>
        <span class="light light-two"></span>
      </div>
    </div>

    <section class="screen">
      <p class="screen-kicker">Live Rate</p>
      <div class="screen-rate-wrap">
        <p class="screen-context" id="rate_context">Syncing rate</p>
        <div class="screen-value-line">
          <p class="screen-rate" id="rate_value">...</p>
          <p class="screen-target" id="rate_target">---</p>
        </div>
      </div>
      <div class="screen-meta">
        <p class="screen-helper" id="helper_text">Conectando con la tasa actual.</p>
        <span class="screen-signature">Ourita v1</span>
      </div>
    </section>

    <section class="controls">
      <div class="selectors-row">
        <label class="control-card">
          <span class="control-label">From</span>
          <div class="select-shell">
            <select id="selector_uno" aria-label="Moneda de origen"></select>
          </div>
          <p class="select-name" id="selector_uno_name">---</p>
        </label>

        <button class="swap-button swap-button-inline" id="botoninvertir" type="button" aria-label="Invertir monedas">
          <span class="swap-icon" aria-hidden="true">⇄</span>
          <span class="sr-only">Invertir monedas</span>
        </button>

        <label class="control-card">
          <span class="control-label">To</span>
          <div class="select-shell">
            <select id="selector_dos" aria-label="Moneda de destino"></select>
          </div>
          <p class="select-name" id="selector_dos_name">---</p>
        </label>
      </div>

      <div class="amount-grid">
        <label class="amount-row">
          <span class="control-label">Amount</span>
          <div class="input-shell">
            <input type="number" id="cantidad_uno" value="1" min="0" step="any" inputmode="decimal" aria-label="Cantidad">
          </div>
        </label>

        <label class="amount-row result-row">
          <span class="control-label">Result</span>
          <div class="input-shell">
            <input type="number" id="cantidad_dos" readonly aria-label="Resultado">
          </div>
        </label>
      </div>
    </section>

    <div class="device-bottom">
      <p class="data-note">
        Datos desde <a href="https://open.er-api.com" target="_blank" rel="noreferrer">open.er-api.com</a>
        usando el endpoint abierto de ExchangeRate-API.
      </p>
    </div>
  </main>

  <footer class="micro-footer" aria-label="Enlaces de Sira Perriki">
    <a class="micro-link" href="https://x.com/SiraPerriki" target="_blank" rel="noreferrer">
      <span class="micro-link-mark">+</span>
      <span>X</span>
    </a>
    <a class="micro-link" href="https://github.com/SiraPerriki" target="_blank" rel="noreferrer">
      <span class="micro-link-mark">+</span>
      <span>GH</span>
    </a>
    <a class="micro-link" href="mailto:Sira.Perriki@proton.me">
      <span class="micro-link-mark">+</span>
      <span>Mail</span>
    </a>
  </footer>
</div>

<script>
const currencies = {
  AED: "Dirham EAU",
  ARS: "Peso argentino",
  AUD: "Dolar australiano",
  BGN: "Lev bulgaro",
  BRL: "Real brasileno",
  BSD: "Dolar bahameno",
  CAD: "Dolar canadiense",
  CHF: "Franco suizo",
  CLP: "Peso chileno",
  CNY: "Yuan chino",
  COP: "Peso colombiano",
  CZK: "Corona checa",
  DKK: "Corona danesa",
  DOP: "Peso dominicano",
  EGP: "Libra egipcia",
  EUR: "Euro",
  FJD: "Dolar fiyiano",
  GBP: "Libra esterlina",
  GTQ: "Quetzal guatemalteco",
  HKD: "Dolar de Hong Kong",
  HUF: "Forinto hungaro",
  IDR: "Rupia indonesia",
  ILS: "Nuevo sequel israeli",
  INR: "Rupia india",
  ISK: "Corona islandesa",
  JPY: "Yen japones",
  KRW: "Won surcoreano",
  KZT: "Tenge kazajo",
  MXN: "Peso mexicano",
  MYR: "Ringgit malayo",
  NOK: "Corona noruega",
  NZD: "Dolar neozelandes",
  PAB: "Balboa panameno",
  PEN: "Sol peruano",
  PHP: "Peso filipino",
  PKR: "Rupia pakistani",
  PLN: "Zloty polaco",
  PYG: "Guarani paraguayo",
  RON: "Leu rumano",
  RUB: "Rublo ruso",
  SAR: "Riyal saudi",
  SEK: "Corona sueca",
  SGD: "Dolar de Singapur",
  THB: "Baht tailandes",
  TRY: "Lira turca",
  TWD: "Dolar taiwanes",
  UAH: "Grivna ucraniana",
  USD: "Dolar estadounidense",
  UYU: "Peso uruguayo",
  VND: "Dong vietnamita",
  ZAR: "Rand sudafricano"
};

const selectorUno = document.getElementById("selector_uno");
const selectorDos = document.getElementById("selector_dos");
const selectorUnoName = document.getElementById("selector_uno_name");
const selectorDosName = document.getElementById("selector_dos_name");
const cantidadUno = document.getElementById("cantidad_uno");
const cantidadDos = document.getElementById("cantidad_dos");
const rateContextEl = document.getElementById("rate_context");
const rateValueEl = document.getElementById("rate_value");
const rateTargetEl = document.getElementById("rate_target");
const helperTextEl = document.getElementById("helper_text");
const botonInvertir = document.getElementById("botoninvertir");
const rateWrapEl = document.querySelector(".screen-rate-wrap");
const resultRowEl = document.querySelector(".result-row");

const ratesCache = new Map();
let latestRequestId = 0;

const rateFormatter = new Intl.NumberFormat("es-ES", {
  maximumSignificantDigits: 6
});

const dateFormatter = new Intl.DateTimeFormat("es-ES", {
  dateStyle: "medium",
  timeStyle: "short"
});

function populateSelectors() {
  const fragmentOne = document.createDocumentFragment();
  const fragmentTwo = document.createDocumentFragment();

  Object.entries(currencies).forEach(([code, label]) => {
    const optionOne = document.createElement("option");
    optionOne.value = code;
    optionOne.textContent = label;

    const optionTwo = optionOne.cloneNode(true);

    fragmentOne.appendChild(optionOne);
    fragmentTwo.appendChild(optionTwo);
  });

  selectorUno.appendChild(fragmentOne);
  selectorDos.appendChild(fragmentTwo);
  selectorUno.value = "EUR";
  selectorDos.value = "USD";
}

function updateSelectorNames() {
  selectorUnoName.textContent = selectorUno.value || "---";
  selectorDosName.textContent = selectorDos.value || "---";
}

function flashResult() {
  [rateWrapEl, resultRowEl].forEach((element) => {
    if (!element) {
      return;
    }

    element.classList.remove("is-flashing");
    void element.offsetWidth;
    element.classList.add("is-flashing");
  });
}

function formatInputNumber(value) {
  if (!Number.isFinite(value)) {
    return "";
  }

  return value.toFixed(3).replace(/\.?0+$/, "");
}

async function getRates(baseCode) {
  if (!ratesCache.has(baseCode)) {
    const request = fetch(`https://open.er-api.com/v6/latest/${baseCode}`)
      .then(async (response) => {
        if (!response.ok) {
          throw new Error("No se pudo consultar el servicio de cambio.");
        }

        const data = await response.json();

        if (data.result !== "success") {
          throw new Error("La respuesta del servicio no fue valida.");
        }

        return data;
      })
      .catch((error) => {
        ratesCache.delete(baseCode);
        throw error;
      });

    ratesCache.set(baseCode, request);
  }

  return ratesCache.get(baseCode);
}

async function calcular() {
  const from = selectorUno.value;
  const to = selectorDos.value;
  const amount = Number.parseFloat(cantidadUno.value);
  const requestId = ++latestRequestId;

  if (!Number.isFinite(amount) || amount < 0) {
    cantidadDos.value = "";
    rateContextEl.textContent = "Input error";
    rateValueEl.textContent = "--";
    rateTargetEl.textContent = "---";
    helperTextEl.textContent = "Usa una cantidad valida y positiva.";
    return;
  }

  if (from === to) {
    cantidadDos.value = formatInputNumber(amount);
    rateContextEl.textContent = `1 ${from} =`;
    rateValueEl.textContent = "1";
    rateTargetEl.textContent = to;
    helperTextEl.textContent = "Misma moneda seleccionada.";
    flashResult();
    return;
  }

  rateContextEl.textContent = `1 ${from} =`;
  rateValueEl.textContent = "...";
  rateTargetEl.textContent = to;
  helperTextEl.textContent = `Consultando ${from} -> ${to}`;

  try {
    const data = await getRates(from);

    if (requestId !== latestRequestId) {
      return;
    }

    const rate = data.rates[to];

    if (!rate) {
      throw new Error("No se encontro la tasa para esa moneda.");
    }

    cantidadDos.value = formatInputNumber(amount * rate);
    rateContextEl.textContent = `1 ${from} =`;
    rateValueEl.textContent = rateFormatter.format(rate);
    rateTargetEl.textContent = to;

    if (data.time_last_update_unix) {
      helperTextEl.textContent = `Actualizado ${dateFormatter.format(new Date(data.time_last_update_unix * 1000))}`;
    } else {
      helperTextEl.textContent = "Conversion lista.";
    }

    flashResult();
  } catch (error) {
    if (requestId !== latestRequestId) {
      return;
    }

    cantidadDos.value = "";
    rateContextEl.textContent = "Rate error";
    rateValueEl.textContent = "!!";
    rateTargetEl.textContent = "---";
    helperTextEl.textContent = error instanceof Error
      ? error.message
      : "Intentalo otra vez en un momento.";
  }
}

selectorUno.addEventListener("change", () => {
  updateSelectorNames();
  calcular();
});

selectorDos.addEventListener("change", () => {
  updateSelectorNames();
  calcular();
});

cantidadUno.addEventListener("input", calcular);

botonInvertir.addEventListener("click", () => {
  [selectorUno.value, selectorDos.value] = [selectorDos.value, selectorUno.value];
  updateSelectorNames();
  calcular();
});

populateSelectors();
updateSelectorNames();
calcular();
</script>
</body>
</html>
